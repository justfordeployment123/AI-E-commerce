name: DB Migration Check

on:
  push:
    paths:
      - 'apps/api/prisma/**'
  pull_request:
    paths:
      - 'apps/api/prisma/**'

jobs:
  check-migrations:
    name: Schema in sync with migrations
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: prisma
          POSTGRES_PASSWORD: prisma
          POSTGRES_DB: shadow
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/api/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Check schema is in sync with migrations
        env:
          DATABASE_URL: postgresql://prisma:prisma@localhost:5432/shadow
          SHADOW_DATABASE_URL: postgresql://prisma:prisma@localhost:5432/shadow
        run: |
          npx prisma migrate diff \
            --from-migrations ./prisma/migrations \
            --to-schema ./prisma/schema.prisma \
            --exit-code
        # Exit code 2 means there are differences (schema ahead of migrations).
        # This means someone edited schema.prisma without running prisma migrate dev.
