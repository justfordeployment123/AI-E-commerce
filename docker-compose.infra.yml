services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-ecommerce-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ai_ecommerce
      POSTGRES_PASSWORD: ai_ecommerce
      POSTGRES_DB: ai_ecommerce
    ports:
      - "5432:5432"
    volumes:
      - ai-ecommerce-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ai_ecommerce -d ai_ecommerce" ]
      interval: 10s
      timeout: 5s
      retries: 5
    # RAM limits for PostgreSQL
    mem_limit: 512m
    mem_reservation: 256m

  redis:
    image: redis:7-alpine
    container_name: ai-ecommerce-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ai-ecommerce-redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    # RAM limits for Redis
    mem_limit: 256m
    mem_reservation: 128m

  garage:
    image: minio/minio:latest
    container_name: ai-ecommerce-garage
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - ai-ecommerce-garage-data:/data
    command: minio server /data --console-address ":9001"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 5
    # RAM limits for MinIO
    mem_limit: 512m
    mem_reservation: 256m

volumes:
  ai-ecommerce-postgres-data:
  ai-ecommerce-redis-data:
  ai-ecommerce-garage-data:
